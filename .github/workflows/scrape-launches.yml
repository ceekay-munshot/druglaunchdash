name: Scrape launches

on:
  schedule:
    # 00:30 UTC daily = 06:00 IST
    - cron: '30 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-launches
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: node scripts/scrape.mjs

      - name: Commit updated launches.json
        run: |
          if ! git diff --quiet public/launches.json; then
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add public/launches.json
            ROWS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('public/launches.json','utf8')).rowCount)")
            git commit -m "chore(data): daily scrape — $ROWS rows [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
